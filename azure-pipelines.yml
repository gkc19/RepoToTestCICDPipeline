trigger:
  branches:
    include:
      - master

pr: none

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '10.0.x'

  # Path from repository root to the Web API project
  projectPath: 'MyAPITesting/MyAPITesting.csproj'

  # Azure DevOps service connection name
  azureServiceConnection: 'Azure-AppService-Connection'

  # Exact Azure App Service name, not the URL
  appServiceName: 'MyFirstWebApp'

stages:

# =========================================================
# CI Stage: Restore, build and publish the .NET Web API
# =========================================================
- stage: Build
  displayName: 'Build Web API'

  jobs:
    - job: BuildJob
      displayName: 'Restore, Build and Publish'

      pool:
        vmImage: 'windows-latest'

      steps:
        - checkout: self
          displayName: 'Checkout GitHub repository'

        - task: UseDotNet@2
          displayName: 'Install .NET SDK'
          inputs:
            packageType: 'sdk'
            version: '$(dotnetVersion)'

        - task: DotNetCoreCLI@2
          displayName: 'Restore NuGet packages'
          inputs:
            command: 'restore'
            projects: '$(projectPath)'

        - task: DotNetCoreCLI@2
          displayName: 'Build Web API'
          inputs:
            command: 'build'
            projects: '$(projectPath)'
            arguments: >
              --configuration $(buildConfiguration)
              --no-restore

        - task: DotNetCoreCLI@2
          displayName: 'Publish Web API'
          inputs:
            command: 'publish'
            publishWebProjects: false
            projects: '$(projectPath)'
            arguments: >
              --configuration $(buildConfiguration)
              --output $(Build.ArtifactStagingDirectory)/publish
              --no-build
            zipAfterPublish: true

        - task: PublishPipelineArtifact@1
          displayName: 'Publish deployment artifact'
          inputs:
            targetPath: '$(Build.ArtifactStagingDirectory)/publish'
            artifact: 'webapi'
            publishLocation: 'pipeline'


# =========================================================
# CD Stage: Deploy the published ZIP to Azure App Service
# =========================================================
- stage: Deploy
  displayName: 'Deploy to Azure App Service'
  dependsOn: Build
  condition: succeeded()

  jobs:
    - deployment: DeployWebApi
      displayName: 'Deploy Web API'

      pool:
        vmImage: 'windows-latest'

      environment: 'Development'

      strategy:
        runOnce:
          deploy:
            steps:
              - download: current
                artifact: 'webapi'

              - task: AzureWebApp@1
                displayName: 'Deploy Web API to App Service'
                inputs:
                  azureSubscription: '$(azureServiceConnection)'
                  appType: 'webApp'
                  appName: '$(appServiceName)'
                  package: '$(Pipeline.Workspace)/webapi/**/*.zip'
